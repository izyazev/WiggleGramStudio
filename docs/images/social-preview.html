<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiggleGram Studio social preview</title>
    <style>
      * { box-sizing: border-box; }

      html,
      body {
        width: 1280px;
        height: 640px;
        margin: 0;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #f7fbfc;
        background: #070a0f;
      }

      body {
        position: relative;
        background:
          radial-gradient(circle at 78% 22%, rgba(255, 75, 91, 0.16), transparent 34%),
          radial-gradient(circle at 16% 82%, rgba(43, 205, 229, 0.15), transparent 32%),
          linear-gradient(135deg, #101721 0%, #080b10 54%, #100b10 100%);
      }

      body::before {
        content: "";
        position: absolute;
        inset: 0;
        opacity: 0.13;
        background-image:
          linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px);
        background-size: 42px 42px;
        mask-image: linear-gradient(90deg, black, transparent 58%);
      }

      .accent {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 7px;
        background: linear-gradient(90deg, #35d0e5 0 48%, #ff5262 52% 100%);
      }

      .content {
        position: absolute;
        z-index: 2;
        top: 62px;
        left: 68px;
        width: 535px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 20px;
        margin-bottom: 42px;
      }

      .brand img {
        width: 86px;
        height: 86px;
        border-radius: 22px;
        filter: drop-shadow(0 12px 25px rgba(0,0,0,.45));
      }

      .brand-name {
        font-size: 39px;
        font-weight: 760;
        letter-spacing: -1.2px;
      }

      .brand-name span {
        display: block;
        margin-top: 3px;
        color: #92a1ae;
        font-size: 14px;
        font-weight: 650;
        letter-spacing: 5px;
        text-transform: uppercase;
      }

      h1 {
        max-width: 520px;
        margin: 0 0 22px;
        font-size: 51px;
        line-height: 1.03;
        letter-spacing: -2.2px;
      }

      h1 em {
        color: #49d2e5;
        font-style: normal;
      }

      .lead {
        max-width: 500px;
        margin: 0;
        color: #b8c2cb;
        font-size: 21px;
        line-height: 1.42;
      }

      .platforms {
        display: flex;
        gap: 10px;
        margin-top: 30px;
      }

      .pill {
        padding: 9px 14px;
        border: 1px solid rgba(255,255,255,.15);
        border-radius: 999px;
        color: #dce4e9;
        background: rgba(255,255,255,.055);
        font-size: 14px;
        font-weight: 650;
      }

      .app-card {
        position: absolute;
        z-index: 1;
        top: 118px;
        right: 34px;
        width: 630px;
        height: 354px;
        overflow: hidden;
        border: 1px solid rgba(117, 211, 226, .35);
        border-radius: 18px;
        background: #080b10;
        box-shadow: 0 28px 75px rgba(0,0,0,.62), 0 0 70px rgba(53,208,229,.08);
      }

      .app-card img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .free {
        position: absolute;
        z-index: 3;
        right: 54px;
        bottom: 36px;
        padding: 10px 17px;
        border: 1px solid rgba(255,82,98,.42);
        border-radius: 9px;
        color: #ff8c97;
        background: rgba(16, 8, 12, .8);
        font-size: 14px;
        font-weight: 750;
        letter-spacing: 1.7px;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div class="accent"></div>
    <main class="content">
      <div class="brand">
        <img src="../../src/assets/wigglegram-logo.png" alt="">
        <div class="brand-name">WiggleGram <span>Studio</span></div>
      </div>
      <h1>Create <em>wigglegrams</em> from multi-lens film photos</h1>
      <p class="lead">Align, crop, preview, and export frames from Nishika, Nimslo, Reto3D, and more.</p>
      <div class="platforms">
        <span class="pill">Windows</span>
        <span class="pill">macOS</span>
        <span class="pill">GIF · MP4 · Images</span>
      </div>
    </main>
    <div class="app-card">
      <img src="app-overview.jpg" alt="">
    </div>
    <div class="free">Free &amp; open source</div>
  </body>
</html>
